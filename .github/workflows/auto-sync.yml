name: Auto-Sync Intervals.icu Data

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Verify sync.py exists
        run: |
          if [ ! -f sync.py ]; then
            echo "❌ ERROR: sync.py not found in repository!"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi
          echo "✅ sync.py found"
          echo "File size: $(wc -c < sync.py) bytes"
      
      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "❌ ERROR: ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "❌ ERROR: INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "✅ All secrets configured"
      
      - name: Run sync
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          WEEK_START: ${{ secrets.WEEK_START }}
          ZONE_PREFERENCE: ${{ secrets.ZONE_PREFERENCE }}
        run: |
          echo "🔍 Debug info:"
          echo "  Python version: $(python --version)"
          echo "  Working directory: $(pwd)"
          echo "  ATHLETE_ID: ${ATHLETE_ID:0:5}..."
          echo "  GITHUB_REPO: $GITHUB_REPO"
          echo ""
          echo "🚀 Running sync script..."
          python sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --github-token "$GITHUB_TOKEN" \
            --github-repo "$GITHUB_REPO" \
            --days 7 || {
              echo "❌ Sync script failed with exit code $?"
              exit 1
            }
      
      - name: Verify latest.json was created/updated
        run: |
          if [ -f latest.json ]; then
            echo "✅ latest.json exists"
            echo "File size: $(wc -c < latest.json) bytes"
            echo "Last modified: $(stat -c %y latest.json 2>/dev/null || stat -f %Sm latest.json)"
          else
            echo "⚠️ latest.json not found - might be no changes detected"
          fi
      
      - name: Archive latest.json with timestamp
        if: success()
        run: |
          # Create archive directory with year-month subdirectory
          YEAR_MONTH=$(date -u +"%Y-%m")
          mkdir -p "archive/${YEAR_MONTH}"
          
          # Get timestamp
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          
          # Copy latest.json to archive if it exists
          if [ -f latest.json ]; then
            cp latest.json "archive/${YEAR_MONTH}/${TIMESTAMP}.json"
            echo "✅ Archived to archive/${YEAR_MONTH}/${TIMESTAMP}.json"
            
            # Configure git
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            
            # Stage ALL generated files BEFORE pulling to prevent
            # "untracked working tree files would be overwritten" errors
            git add archive/
            if [ -f ftp_history.json ]; then
              git add ftp_history.json
              echo "✅ Staged ftp_history.json"
            fi
            if [ -f history.json ]; then
              git add history.json
              echo "✅ Staged history.json"
            fi
            if [ -f latest.json ]; then
              git add latest.json
              echo "✅ Staged latest.json"
            fi
            if [ -f intervals.json ]; then
              git add intervals.json
              echo "✅ Staged intervals.json"
            fi
            if [ -f routes.json ]; then
              git add routes.json
              echo "✅ Staged routes.json"
            fi
            
            # Now pull - autostash will safely stash staged changes
            git pull --rebase --autostash origin main
            
            # Only commit if there are changes
            if ! git diff --staged --quiet; then
              git commit -m "Archive training data + FTP history - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
              git push
              echo "✅ Archive and FTP history committed and pushed"
            else
              echo "⏭️  No new archive to commit"
            fi
          else
            echo "⚠️ Skipping archive - no latest.json to archive"
          fi
      
      - name: Update README with last sync time
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          SYNC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          if [ -f README.md ]; then
            echo "Current README content (first 5 lines):"
            head -5 README.md
            
            if grep -q "Last successful sync:" README.md; then
              echo "Found existing timestamp line, updating..."
              sed -i "s/\*\*Last successful sync:\*\*.*/\*\*Last successful sync:\*\* ${SYNC_TIME}/" README.md
            else
              echo "No timestamp found, adding new line..."
              sed -i "/badge.svg)/a\\\n\*\*Last successful sync:\*\* ${SYNC_TIME}\n" README.md
            fi
            
            echo "Updated README content (first 5 lines):"
            head -5 README.md
            
            if ! git diff --quiet README.md; then
              git add README.md
              git commit -m "Update last sync timestamp: ${SYNC_TIME}"
              git push
              echo "✅ README updated with sync time: ${SYNC_TIME}"
            else
              echo "⚠️ No changes detected in README"
            fi
          fi
      
      - name: Upload data files for download
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: training-data
          path: |
            latest.json
            history.json
            intervals.json
            routes.json
            ftp_history.json
          retention-days: 7
          if-no-files-found: ignore
      
      - name: Show result
        run: |
          echo "✅ Sync completed successfully!"
          echo "📊 View data: https://raw.githubusercontent.com/${{ github.repository }}/main/latest.json"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::⚠️ Sync failed! Check the logs above for details."
          echo "Common issues:"
          echo "  - Check ATHLETE_ID and INTERVALS_KEY secrets"
          echo "  - Verify Intervals.icu API is accessible"
          echo "  - Check GitHub token permissions"
